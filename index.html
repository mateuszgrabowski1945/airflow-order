<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRFLOW - System Zamówień</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid py-4">

    <div class="hero mb-4">

    <img
        src="images/logo/logo.png"
        class="hero-logo"
        alt="AIRFLOW">

    <p class="hero-subtitle">
        System zamówień online
    </p>

</div>

    <div class="row">

        <!-- LEWA STRONA -->

        <div class="col-xl-8">

            <div class="products-header">

                <h2>Produkty</h2>

                <span id="productCounter">0 produktów</span>

            </div>

            <div id="productsContainer" class="row"></div>

        </div>

        <!-- PRAWA STRONA -->

        <div class="col-xl-4">

            <div class="checkout-panel">

                <!-- KOSZYK -->

                <section class="checkout-section">

                    <h3>🛒 Koszyk</h3>

                    <div id="cartItems">

                        <p>Koszyk jest pusty.</p>

                    </div>

                    <div class="cart-summary">

                        <strong>Razem:</strong>

                        <span id="cartTotal">0.00 zł</span>

                    </div>

                </section>

                <!-- DOSTAWA -->

                <section class="checkout-section">

                    <h3>🚚 Dostawa</h3>

                    <div class="form-check mb-2">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="shipping"
                            id="inpost"
                            value="18"
                            checked>

                        <label class="form-check-label">
                            Paczkomat InPost (18 zł)
                        </label>

                    </div>

                    <div id="inpostBox">

                        <input
                            type="text"
                            class="form-control mb-3"
                            id="lockerCode"
                            placeholder="Kod paczkomatu">

                    </div>

                    <div class="form-check mb-2">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="shipping"
                            id="dpd"
                            value="20">

                        <label class="form-check-label">
                            Kurier DPD (20 zł)
                        </label>

                    </div>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="shipping"
                            id="pickup"
                            value="0">

                        <label class="form-check-label">
                            Odbiór osobisty
                        </label>

                    </div>

                </section>

                <!-- DANE -->

                <section class="checkout-section">

                    <h3>👤 Dane zamawiającego</h3>

                    <input
                        type="text"
                        class="form-control mb-3"
                        placeholder="Imię i nazwisko"
                        id="customerName">

                    <input
                        type="text"
                        class="form-control mb-3"
                        placeholder="Firma"
                        id="company">

                    <input
                        type="email"
                        class="form-control mb-3"
                        placeholder="Adres e-mail"
                        id="email">

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Telefon"
                        id="phone">

                </section>

                <!-- ADRES -->

                <section class="checkout-section">

                    <h3>📦 Adres dostawy</h3>

                    <input
                        type="text"
                        class="form-control mb-3"
                        placeholder="Ulica i numer"
                        id="street">

                    <div class="row">

                        <div class="col-4">

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Kod"
                                id="zip">

                        </div>

                        <div class="col-8">

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Miasto"
                                id="city">

                        </div>

                    </div>

                </section>

              <button
    class="btn btn-airflow btn-lg w-100 mt-3"
    id="orderButton"
    onclick="sendOrder()">

    ZAMAWIAM

</button>

            </div>

        </div>

    </div>
<div class="mobile-cart-bar">

    <div>

        <strong id="mobileCartTotal">
            0.00 zł
        </strong>

    </div>

    <button
        class="btn btn-airflow"
        onclick="document.getElementById('orderButton').scrollIntoView({behavior:'smooth'})">

        Przejdź do zamówienia

    </button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="js/cart.js"></script>
<script src="js/order.js"></script>
<script src="js/app.js"></script>

</body>
</html>
