<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRFLOW - Zamówienia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="hero">
        <h1>AIRFLOW</h1>
        <p>Profesjonalny system zamówień</p>
    </div>

    <div class="row">

        <!-- LEWA STRONA - PRODUKTY -->
        <div class="col-lg-8">

            <section class="mb-5">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2 class="section-title mb-0">
                        Produkty
                    </h2>

                    <span class="text-secondary" id="productCounter">
                        0 produktów
                    </span>

                </div>

                <div class="row" id="productsContainer"></div>

            </section>

        </div>

        <!-- PRAWA STRONA - KOSZYK -->
        <div class="col-lg-4">

            <div class="cart-box">

                <h3>Koszyk</h3>

                <div id="cartItems">

                    <p>Koszyk jest pusty.</p>

                </div>

                <hr>

                <h4>
                    Razem:
                    <span id="cartTotal">
                        0.00 zł
                    </span>
                </h4>

            </div>

        </div>

    </div>

</div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
